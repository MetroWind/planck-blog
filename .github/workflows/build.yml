name: Build Arch Package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    steps:
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm git cmake zstd hub
        # Add user builder
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get tags to make sure the repo is valid
      run: git fetch --tags origin

    - name: Build Package
      run: |
        # Fix permissions for builder
        chown -R builder:builder .

        # Switch to builder and build
        # makepkg will clone the repo from the URL in PKGBUILD
        su builder -c "
          cd packages/arch
          makepkg -s --noconfirm
        "

    - name: Compress Binary
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        # Compress the binary built by makepkg
        zstd packages/arch/src/planck-blog/build/planck-blog -o planck-blog.zst

    - name: Find Package File
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      id: find_package
      run: |
        PKG_PATH=$(find packages/arch -maxdepth 1 -name "*.pkg.tar.zst" ! -name "*-debug-*" | head -n 1)
        echo "pkg_path=$PKG_PATH" >> $GITHUB_OUTPUT
        echo "pkg_name=$(basename $PKG_PATH)" >> $GITHUB_OUTPUT

    - name: Release
      run: |
        hub release create "Arch Package ${{ github.sha }}" -m "It’s a release" -a ${{ steps.find_package.outputs.pkg_path }} -a planck-blog.zst
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
